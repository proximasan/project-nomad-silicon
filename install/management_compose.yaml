# Project N.O.M.A.D. management services Docker Compose configuration (macOS / Apple Silicon)
#
# This compose file defines the admin server, database, and other supporting services required to run Project N.O.M.A.D.
# You can use this with `docker-compose up -d` to start all the necessary services with a single command after installation.
#
# Note: we recommend leaving all of the environment variables as-is except for any "replaceme" values,
# which must be updated for the admin server to start successfully. The default values are optimized for ease of installation and use,
# but you can customize them as needed (e.g. changing ports, database connection details, log level, etc.)
#
# Path handling: All occurrences of NOMAD_STORAGE_PATH_PLACEHOLDER are replaced by the install script
# with the actual installation directory (e.g. $HOME/project-nomad on macOS).
name: project-nomad
services:
  admin:
    image: ghcr.io/proximasan/project-nomad:latest
    pull_policy: always
    container_name: nomad_admin
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - NOMAD_STORAGE_PATH_PLACEHOLDER/storage:/app/storage # If you change the default storage path, make sure to update the disk-collector config as well!
      - /var/run/docker.sock:/var/run/docker.sock # Allows the admin service to communicate with the Host's Docker daemon (Docker Desktop creates this symlink on macOS)
      - nomad-update-shared:/app/update-shared # Shared volume for update communication
    environment:
      - NODE_ENV=production
      # PORT is the port the admin server listens on *inside* the container and should not be changed. If you want to change which port the admin interface is accessible from on the host, you can change the port mapping in the "ports" section (e.g. "9090:8080" to access it on port 9090 from the host)
      - PORT=8080
      - LOG_LEVEL=info
      # APP_KEY needs to be at least 16 chars or will fail validation and container won't start!
      - APP_KEY=replaceme
      # # Leave HOST as is so the admin server listens all interfaces within the container - this doesn't affect how you access it from the host, it's just for internal container networking
      - HOST=0.0.0.0
      # URL should be set to the URL you will access the admin interface at (e.g. http://localhost:8080 or http://192.168.1.x:8080)
      - URL=replaceme
      - DB_HOST=mysql
      # If you change the MySQL port, make sure to update this accordingly
      - DB_PORT=3306
      - DB_DATABASE=nomad
      - DB_USER=nomad_user
      # Needs to match the MYSQL_PASSWORD in the mysql service!
      - DB_PASSWORD=replaceme
      - DB_NAME=nomad
      - DB_SSL=false
      - REDIS_HOST=redis
      # If you change the Redis port, make sure to update this accordingly
      - REDIS_PORT=6379
      # NOMAD_STORAGE_PATH tells the admin app where storage lives on the host.
      # The install script replaces NOMAD_STORAGE_PATH_PLACEHOLDER with the real host path.
      - NOMAD_STORAGE_PATH=NOMAD_STORAGE_PATH_PLACEHOLDER/storage
      # APPLE_CHIP_MODEL and OLLAMA_HOST are injected by the install script when applicable.
      # APPLE_CHIP_MODEL provides CPU info since systeminformation returns empty data inside Docker on macOS.
      # OLLAMA_HOST is set to http://host.docker.internal:11434 when native Ollama is chosen for Metal GPU acceleration.
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  dozzle:
    # Dozzle is an optional container that allows for easily viewing container logs. We recommend including it unless you have a specific reason not to. Note that if you don't install it, the "Service Logs & Metrics" link in Settings that launches Dozzle will not work.
    image: amir20/dozzle:v10.0
    container_name: nomad_dozzle
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Allows Dozzle to read logs from the Host's Docker daemon
    environment:
      - DOZZLE_ENABLE_ACTIONS=false # Disabled — unauthenticated container stop/restart on LAN
      - DOZZLE_ENABLE_SHELL=false  # Disabled — shell access + Docker socket = privilege escalation
  mysql:
    image: mysql:8.0
    container_name: nomad_mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=replaceme
      - MYSQL_DATABASE=nomad
      - MYSQL_USER=nomad_user
      # Needs to match DB_PASSWORD in the admin service!
      - MYSQL_PASSWORD=replaceme
    volumes:
      - NOMAD_STORAGE_PATH_PLACEHOLDER/mysql:/var/lib/mysql # Persist MySQL data on the host. This path can be changed if needed, just make sure it's writable by the container. Host persistence is important for the database to ensure your data isn't lost when the container is removed or updated.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
  redis:
    image: redis:7-alpine
    container_name: nomad_redis
    restart: unless-stopped
    volumes:
      - NOMAD_STORAGE_PATH_PLACEHOLDER/redis:/data # Persist Redis data on the host. This path can be changed if needed, just make sure it's writable by the container. Host persistence is important for Redis to ensure your data isn't lost when the container is removed or updated.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
  updater:
    # Updater is a lightweight sidecar container that allows the admin container to be updated from within it's own UI
    image: ghcr.io/proximasan/project-nomad-sidecar-updater:latest
    pull_policy: always
    container_name: nomad_updater
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Allows communication with the Host's Docker daemon
      - NOMAD_STORAGE_PATH_PLACEHOLDER:NOMAD_STORAGE_PATH_PLACEHOLDER # Writable access required so the updater can set the correct image tag in compose.yml. This needs to be the same location that the compose file is located at on the host for the updater to work correctly
      - nomad-update-shared:/shared # Shared volume for communication with admin container
    environment:
      # COMPOSE_FILE tells the updater where the compose file lives inside the container.
      # The install script replaces NOMAD_STORAGE_PATH_PLACEHOLDER with the real host path.
      - NOMAD_COMPOSE_FILE=NOMAD_STORAGE_PATH_PLACEHOLDER/compose.yml
  disk-collector:
    # Disk Collector is a lightweight container that collects disk usage information and shares it with
    # the admin container so it can be displayed in the UI.
    # On macOS (Docker Desktop), we cannot mount the entire host filesystem. Instead we mount just
    # the storage directory and report usage for that volume.
    image: ghcr.io/proximasan/project-nomad-disk-collector:latest
    pull_policy: always
    container_name: nomad_disk_collector
    restart: unless-stopped
    volumes:
      - NOMAD_STORAGE_PATH_PLACEHOLDER/storage:/storage

volumes:
  nomad-update-shared:
    driver: local
